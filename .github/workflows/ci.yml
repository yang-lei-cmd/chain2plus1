# ============================================================
# Chain2Plus1 — CI/CD Pipeline
# ============================================================
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Quality & Tests
  # ============================================================
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: chain2plus1_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./...

      - name: Run unit & integration tests (CGO-free SQLite)
        run: go test -v -count=1 ./...
        env:
          CGO_ENABLED: 0

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=1 -run '^$' ./internal/engine/ ./internal/service/ 2>&1

      - name: Check Go module tidiness
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Build React frontend
        run: |
          cd frontend
          npm install
          npm run build

  # ============================================================
  # Job 2: Docker Build
  # ============================================================
  docker:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false  # Set to true when Docker registry is configured
          tags: chain2plus1:latest

